<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SV Operations Schedule</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #03030a;
      --panel: #10091f;
      --purple: #7c4dff;
      --purple-soft: #c99cff;
      --green: #43d17a;
      --text: #f7f4ff;
      --muted: #cdb8ef;
      --border: rgba(124,77,255,0.65);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,77,255,0.22), transparent 35%),
        linear-gradient(180deg, #03030a 0%, #070711 100%);
      color: var(--text);
      padding: 28px 20px;
    }

    .page { max-width: 1500px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 { margin: 0; font-size: 38px; letter-spacing: -1px; }
    .subtitle { margin-top: 8px; color: var(--muted); }

    .source-pill {
      border: 1px solid var(--green);
      color: var(--green);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      white-space: nowrap;
    }

    .list-view-btn {
      border: 1px solid var(--purple);
      color: var(--purple-soft);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      background: rgba(124,77,255,0.1);
    }

    .list-view-btn.active {
      background: var(--purple);
      color: #fff;
    }

    .list-view-btn:hover {
      background: rgba(124,77,255,0.2);
    }

    .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(27,16,54,0.95), rgba(8,8,18,0.95));
    }

    .controls-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .controls-row #search {
      flex: 2;
      min-width: 160px;
    }

    .controls-row #networkFilter,
    .controls-row .filter-group {
      flex: 1;
      min-width: 140px;
    }

    .nav-group {
      display: flex;
      gap: 10px;
    }

    .controls-row:first-child {
      justify-content: space-between;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
    }

    .view-btn {
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 12px;
      background: #0c0a18;
      border: 1px solid rgba(201,156,255,0.35);
      color: var(--muted);
      cursor: pointer;
    }

    .view-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    button, input, select {
      background: #0c0a18;
      border: 1px solid rgba(201,156,255,0.45);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
    }

    button { cursor: pointer; }
    input::placeholder { color: #9b8bb7; }

    .month-title {
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      margin: 20px 0 18px;
    }

    .weekdays,
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .weekdays { margin-bottom: 10px; }

    .weekday {
      color: var(--purple-soft);
      font-weight: 900;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .day {
      height: 300px;
      border: 1px solid rgba(124,77,255,0.7);
      border-radius: 14px;
      background:
        radial-gradient(circle at top left, rgba(124,77,255,0.18), transparent 45%),
        linear-gradient(135deg, #1a0f34, #070812);
      padding: 12px;
      overflow-y: auto;
      overflow-x: hidden;
      cursor: pointer;
    }

    .day:hover {
      border-color: var(--purple-soft);
    }

    .day.outside { opacity: 0.35; }

    .day.today {
      border-color: var(--purple-soft);
      box-shadow: 0 0 18px rgba(201,156,255,0.25);
    }

    .day-number {
      font-weight: 900;
      color: var(--purple-soft);
      margin-bottom: 10px;
    }

    .event {
      border: 1px solid rgba(201,156,255,0.35);
      border-left: 4px solid rgba(201,156,255,0.45);
      border-radius: 12px;
      background: rgba(124,77,255,0.22);
      padding: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.4;
    }

    .event.devnet {
      background: rgba(37,99,235,0.28);
      border-color: #2563eb;
      border-left: 4px solid #2563eb;
    }

    .event.testnet {
      background: rgba(250, 204, 21, 0.16);
      border-color: #facc15;
        border-left: 4px solid #facc15;
    }

    .event.mainnet {
      background: rgba(22,163,74,0.28);
      border-color: #16a34a;
      border-left: 4px solid #16a34a;
    }

    .event-separator {
      height: 1px;
      background: rgba(201,156,255,0.2);
      margin: 14px 0 10px;
    }

    .title {
      font-weight: 900;
      margin-bottom: 6px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 10px;
      color: var(--muted);
      border: 1px solid rgba(201,156,255,0.28);
      border-radius: 999px;
      padding: 3px 7px;
      font-weight: 700;
      background: rgba(201,156,255,0.08);
    }

    .tag.devnet {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    .tag.testnet {
      background: #fde047;
      border-color: #fde047;
      color: #111827;
    }

    .tag.mainnet {
      background: #16a34a;
      border-color: #16a34a;
      color: #ffffff;
    }

    .description { white-space: pre-wrap; }

    .network-section {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(201,156,255,0.25);
    }

    .network-title {
      color: var(--purple-soft);
      font-weight: 900;
      text-decoration: underline;
      margin-bottom: 4px;
    }

    .footer-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      margin-top: 18px;
      font-size: 14px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-group select { flex: 1; min-width: 0; }

    .info-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      opacity: 0.7;
    }

    .info-btn:hover { opacity: 1; color: var(--purple-soft); }

    .popover-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 999;
    }

    .popover {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 420px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      z-index: 1000;
      color: var(--text);
    }

    .popover h3 {
      margin: 0 0 18px;
      font-size: 20px;
      color: var(--purple-soft);
    }

    .popover-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .popover-close:hover { color: var(--text); }

    .popover-item {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(201,156,255,0.12);
    }

    .popover-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .popover-item-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
      color: var(--text);
    }

    .popover-item-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .week-view .day {
      height: auto;
      min-height: 300px;
    }

    .week-view .weekday {
      font-size: 13px;
    }

    .day-view-container {
      display: block;
    }

    .day-view-container .day {
      height: auto;
      min-height: 200px;
      margin-bottom: 0;
    }

    .day-view-container .day-number {
      font-size: 22px;
      margin-bottom: 16px;
    }

    .day-view-container .event {
      font-size: 15px;
    }

    .day-view-container .type-header {
      font-size: 17px;
      font-weight: 800;
      color: var(--purple-soft);
      margin: 24px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(201,156,255,0.15);
      letter-spacing: 0.02em;
    }

    .day-view-container .type-header:first-of-type {
      margin-top: 0;
    }

    .day-view-container .tag {
      font-size: 12px;
    }

    .connection-tag {
      background: rgba(124,77,255,0.25);
      border-color: var(--purple) !important;
      color: var(--purple-soft);
      font-weight: 800;
    }

    .connected-event {
      border: 1px solid rgba(124,77,255,0.3);
      border-radius: 12px;
      padding: 12px;
      margin: 8px 0 12px 16px;
      opacity: 0.85;
      background: rgba(124,77,255,0.06);
    }

    .connected-event .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .connected-event .meta-row {
      margin-bottom: 8px;
    }

    .connected-event .view-btn {
      font-size: 13px;
      padding: 6px 12px;
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .connected-event .view-btn:hover {
      opacity: 0.85;
    }

    .connected-divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(124,77,255,0.4), transparent);
      margin: 8px 0 8px 16px;
    }

    .connected-label {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 6px 16px;
      font-weight: 600;
    }

    .list-view-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .mini-calendar {
      position: sticky;
      top: 20px;
      min-width: 400px;
      max-width: 400px;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(27,16,54,0.95), rgba(8,8,18,0.95));
    }

    .mini-calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .mini-calendar-header .month-label {
      font-weight: 900;
      font-size: 17px;
      color: var(--purple-soft);
    }

    .mini-calendar-header button {
      padding: 6px 10px;
      font-size: 15px;
      border-radius: 8px;
      line-height: 1;
    }

    .mini-weekdays,
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .mini-weekdays {
      margin-bottom: 8px;
    }

    .mini-weekday {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      padding: 4px 0;
    }

    .mini-day {
      text-align: center;
      font-size: 15px;
      padding: 8px 0;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text);
    }

    .mini-day:hover {
      background: rgba(124,77,255,0.2);
    }

    .mini-day.outside {
      opacity: 0.25;
    }

    .mini-day.today {
      background: var(--purple);
      color: #fff;
      font-weight: 700;
    }

    .mini-day.active {
      background: rgba(124,77,255,0.3);
      font-weight: 700;
    }

    .list-event-container {
      flex: 1;
      min-width: 0;
      max-height: 80vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .list-event-container::-webkit-scrollbar {
      width: 6px;
    }

    .list-event-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .list-event-container::-webkit-scrollbar-thumb {
      background: rgba(124,77,255,0.3);
      border-radius: 3px;
    }

    .list-day-header {
      font-size: 16px;
      font-weight: 800;
      color: var(--purple-soft);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(201,156,255,0.15);
    }

    .list-day-header:first-of-type {
      margin-top: 0;
    }

    .list-sentinel {
      height: 1px;
    }

    @media (max-width: 900px) {
      .list-view-container {
        flex-direction: column;
      }
      .mini-calendar {
        position: static;
        min-width: 0;
        max-width: none;
        width: 100%;
      }
      header { flex-direction: column; align-items: flex-start; }
      .controls-row { flex-direction: column; align-items: stretch; }
      .controls-row #search { min-width: 0; }
      .controls-row #networkFilter,
      .controls-row .filter-group { min-width: 0; }
      .view-toggle { margin-left: 0; justify-content: center; }
      .day { height: 240px; }
      .event { font-size: 11px; }
    }

    @media (max-width: 700px) {
      body { padding: 18px 12px; }
      h1 { font-size: 28px; }
      .weekdays { display: none; }
      .calendar { display: block; }

      .day {
        height: auto;
        min-height: 120px;
        margin-bottom: 14px;
      }

      .day.outside { display: none; }

      .day-number {
        font-size: 20px;
        color: var(--purple-soft);
        border-bottom: 1px solid rgba(201,156,255,0.25);
        padding-bottom: 8px;
      }

      .event { font-size: 14px; }

      .footer-meta {
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div>
        <h1>SV Operations Schedule</h1>
        <div class="subtitle">Approved schedule items published from monday.com.</div>
      </div>
      <div class="header-right">
        <div class="source-pill">Source: monday.com approved items</div>
        <button class="list-view-btn" id="listViewBtn" onclick="toggleListView()">List view</button>
      </div>
    </header>

    <section class="controls">
      <div class="controls-row">
        <div class="nav-group">
          <button onclick="prev()">← Previous</button>
          <button onclick="goToday()">Today</button>
          <button onclick="next()">Next →</button>
        </div>
        <div class="view-toggle" id="viewToggle">
          <button class="view-btn active" data-view="month">Month</button>
          <button class="view-btn" data-view="week">Week</button>
          <button class="view-btn" data-view="day">Day</button>
        </div>
      </div>

      <div class="controls-row">
        <input id="search" placeholder="Search approved events..." />

        <select id="networkFilter">
          <option value="">All Networks</option>
        </select>

        <div class="filter-group">
          <select id="typeFilter">
            <option value="">All activity types</option>
          </select>
          <button class="info-btn" onclick="showTypeInfo()" title="What do these mean?" type="button">ⓘ</button>
        </div>
      </div>
    </section>

    <div class="month-title" id="monthTitle"></div>

    <div class="weekdays">
      <div class="weekday">MON</div>
      <div class="weekday">TUE</div>
      <div class="weekday">WED</div>
      <div class="weekday">THU</div>
      <div class="weekday">FRI</div>
      <div class="weekday">SAT</div>
      <div class="weekday">SUN</div>
    </div>

    <main class="calendar" id="calendar"></main>

    <div class="footer-meta">
      <div id="updated">↻ Loading schedule...</div>
      <div>Only Approved monday items are shown</div>
    </div>
  </div>

  <script>
    let allEvents = [];
    let currentDate = new Date();
    let currentView = 'month';
    let listObserver = null;

    async function loadSchedule() {
      const response = await fetch('./schedule.json?cache=' + Date.now());
      allEvents = await response.json();

      buildConnections();
      populateNetworkFilter();
      populateTypeFilter();

      document.getElementById('updated').textContent =
        '↻ Last loaded: ' + new Date().toLocaleString();

      renderCalendar();
    }

    function buildConnections() {
      const freezeEvents = allEvents.filter(e =>
        (e.title || '').toLowerCase().includes('topology freeze')
      );
      const lsuEvents = allEvents.filter(e =>
        e.type === 'Protocol Upgrades (LSU)' &&
        !(e.title || '').toLowerCase().includes('topology freeze')
      );

      freezeEvents.forEach(freeze => {
        const freezeDate = (freeze.start || '').split(' ')[0];
        if (!freezeDate) return;
        const d = new Date(freezeDate + 'T00:00:00');
        d.setDate(d.getDate() + 1);
        const nextDay = dateKey(d);

        const lsu = lsuEvents.find(e => {
          const eDate = (e.start || '').split(' ')[0];
          return eDate === nextDay && normalizeNetwork(e.network) === normalizeNetwork(freeze.network);
        });

        if (lsu) {
          freeze._connection = { target: lsu, type: 'freeze' };
          lsu._connection = { target: freeze, type: 'lsu' };
        }
      });
    }

    function normalizeNetwork(network) {
      const value = String(network || '').trim().toLowerCase();

      if (value === 'dev net' || value === 'devnet') return 'DevNet';
      if (value === 'testnet' || value === 'test net') return 'TestNet';
      if (value === 'mainnet' || value === 'main net') return 'MainNet';
      if (value === 'minimum versions' || value === 'minimum version') return 'Minimum Versions';

      return String(network || '').trim();
    }

    function networkClass(network) {
      if (network === 'DevNet') return 'devnet';
      if (network === 'TestNet') return 'testnet';
      if (network === 'MainNet') return 'mainnet';
      return '';
    }

    function populateNetworkFilter() {
      const select = document.getElementById('networkFilter');
      const currentValue = select.value;

      const orderedNetworks = [
        'DevNet',
        'TestNet',
        'MainNet',
        'Minimum Versions'
      ];

      select.innerHTML = '<option value="">All Networks</option>';

      orderedNetworks.forEach(network => {
        const exists = allEvents.some(event => normalizeNetwork(event.network) === network);

        if (!exists) return;

        const option = document.createElement('option');
        option.value = network;
        option.textContent = network;
        select.appendChild(option);
      });

      select.value = currentValue;
    }

    function populateTypeFilter() {
      const select = document.getElementById('typeFilter');
      const currentValue = select.value;

      select.innerHTML = '<option value="">All activity types</option>';

      const types = [...new Set(
        allEvents
          .map(event => event.type)
          .filter(Boolean)
      )].sort();

      types.forEach(type => {
        const option = document.createElement('option');
        option.value = type;
        option.textContent = type;
        select.appendChild(option);
      });

      select.value = currentValue;
    }

    function dateKey(date) {
      return date.getFullYear() + '-' +
        String(date.getMonth() + 1).padStart(2, '0') + '-' +
        String(date.getDate()).padStart(2, '0');
    }

    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay();
      d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
      return d;
    }

    function eventHasTime(event) {
      const parts = (event.start || '').split(' ');
      return parts.length === 2;
    }

    function eventTime(event) {
      return (event.start || '').split(' ')[1] || '';
    }

    function eventEndTime(event) {
      const parts = (event.end || '').split(' ');
      return parts.length === 2 ? parts[1] : '';
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
    }

    function extractTitleTime(title) {
      if (!title) return '';
      const m1 = title.match(/\b(\d{1,2}(:\d{2})?\s*(am|pm|AM|PM))\b/);
      if (m1) return m1[1];
      const m2 = title.match(/\b(\d{4}\s+(UTC|utc))\b/);
      if (m2) return m2[1];
      return '';
    }

    function appendDescription(parent, description) {
      const lines = String(description || '')
        .split(/\r?\n|\r/)
        .map(line => line.trim())
        .filter(Boolean);

      let section = null;

      lines.forEach(line => {
        const isNetwork =
          /^DevNet:\s*$/i.test(line) ||
          /^TestNet:\s*$/i.test(line) ||
          /^MainNet:\s*$/i.test(line);

        if (isNetwork) {
          section = document.createElement('div');
          section.className = 'network-section';

          const title = document.createElement('div');
          title.className = 'network-title';
          title.textContent = line;

          section.appendChild(title);
          parent.appendChild(section);
          return;
        }

        const div = document.createElement('div');
        div.className = 'description';
        div.textContent = line;

        if (section) {
          section.appendChild(div);
        } else {
          parent.appendChild(div);
        }
      });
    }

    function renderEvent(event) {
      const eventDiv = document.createElement('div');
      const network = normalizeNetwork(event.network);

      if (network === 'DevNet') {
        eventDiv.className = 'event devnet';
      } else if (network === 'TestNet') {
        eventDiv.className = 'event testnet';
      } else if (network === 'MainNet') {
        eventDiv.className = 'event mainnet';
      } else {
        eventDiv.className = 'event';
      }

      const title = document.createElement('div');
      title.className = 'title';
      if (event._connection) {
        const arrow = document.createElement('span');
        arrow.textContent = event._connection.type === 'freeze' ? '→ ' : '← ';
        arrow.style.cssText = 'color: var(--purple); font-size: 12px; margin-right: 2px;';
        title.appendChild(arrow);
      }
      title.append(event.title || 'Untitled event');

      const meta = document.createElement('div');
      meta.className = 'meta-row';

      if (eventHasTime(event)) {
        const startTime = eventTime(event);
        const endTime = eventEndTime(event) || '23:59';
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = formatTime(startTime) + ' - ' + formatTime(endTime);
        meta.appendChild(tag);
      } else {
        const titleTime = extractTitleTime(event.title);
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = titleTime || 'All day';
        meta.appendChild(tag);
      }

      if (network) {
        const tag = document.createElement('span');
        const colorClass = networkClass(network);

        tag.className = colorClass ? `tag ${colorClass}` : 'tag';
        tag.textContent = network;
        meta.appendChild(tag);
      }

      if (event._connection) {
        const targetDate = new Date((event._connection.target.start || '').split(' ')[0]);
        const dateStr = targetDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const tag = document.createElement('span');
        tag.className = 'tag connection-tag';
        tag.textContent = event._connection.type === 'freeze'
          ? '→ LSU ' + dateStr
          : '← Freeze ' + dateStr;
        meta.appendChild(tag);
      }

      if (event.type) {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = event.type;
        meta.appendChild(tag);
      }

      eventDiv.appendChild(title);

      if (meta.children.length) {
        eventDiv.appendChild(meta);
      }

      if (event.description) {
        appendDescription(eventDiv, event.description);
      }

      return eventDiv;
    }

    function renderGroupedEvents(container, events) {
      const groups = new Map();
      events.forEach(event => {
        const type = event.type || 'General';
        if (!groups.has(type)) groups.set(type, []);
        groups.get(type).push(event);
      });

      let first = true;
      for (const [, group] of groups) {
        if (!first) {
          const sep = document.createElement('div');
          sep.className = 'event-separator';
          container.appendChild(sep);
        }
        first = false;
        group.forEach(event => container.appendChild(renderEvent(event)));
      }
    }

    function updateViewTitle() {
      const el = document.getElementById('monthTitle');
      if (currentView === 'month') {
        el.textContent = currentDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
      } else if (currentView === 'week') {
        const monday = getMonday(currentDate);
        el.textContent = 'Week of ' + monday.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
      } else if (currentView === 'list') {
        el.textContent = 'From ' + currentDate.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
      } else {
        el.textContent = currentDate.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      }
    }

    function getFilteredEvents() {
      const search = document.getElementById('search').value.toLowerCase();
      const selectedNetwork = document.getElementById('networkFilter').value;
      const selectedType = document.getElementById('typeFilter').value;

      return allEvents.filter(event => {
        const normalizedNetwork = normalizeNetwork(event.network);
        const searchable = [
          event.title,
          event.description,
          normalizedNetwork,
          event.type,
          event.category,
          event.status
        ].join(' ').toLowerCase();

        return searchable.includes(search) &&
          (!selectedNetwork || normalizedNetwork === selectedNetwork) &&
          (!selectedType || event.type === selectedType);
      });
    }

    function renderCalendar() {
      if (currentView === 'month') renderMonthView();
      else if (currentView === 'week') renderWeekView();
      else if (currentView === 'day') renderDayView();
      else renderListView();
    }

    function updateWeekdayHeaders() {
      const container = document.querySelector('.weekdays');
      if (currentView === 'day' || currentView === 'list' || window.innerWidth <= 700) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'grid';
      if (currentView === 'month') {
        container.innerHTML =
          '<div class="weekday">MON</div><div class="weekday">TUE</div><div class="weekday">WED</div><div class="weekday">THU</div><div class="weekday">FRI</div><div class="weekday">SAT</div><div class="weekday">SUN</div>';
      } else {
        const monday = getMonday(currentDate);
        container.innerHTML = '';
        for (let i = 0; i < 7; i++) {
          const d = new Date(monday);
          d.setDate(monday.getDate() + i);
          const div = document.createElement('div');
          div.className = 'weekday';
          if (window.innerWidth <= 700) {
            div.textContent = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
          } else {
            div.textContent = d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' }).toUpperCase();
          }
          container.appendChild(div);
        }
      }
    }

    function renderMonthView() {
      const calendar = document.getElementById('calendar');
      calendar.className = 'calendar';

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const filtered = getFilteredEvents();

      updateViewTitle();
      updateWeekdayHeaders();

      const firstDay = new Date(year, month, 1);
      let mondayStartOffset = firstDay.getDay() - 1;
      if (mondayStartOffset < 0) mondayStartOffset = 6;
      const gridStart = new Date(firstDay);
      gridStart.setDate(firstDay.getDate() - mondayStartOffset);

      calendar.innerHTML = '';
      const todayKey = dateKey(new Date());

      for (let i = 0; i < 35; i++) {
        const dayDate = new Date(gridStart);
        dayDate.setDate(gridStart.getDate() + i);
        const key = dateKey(dayDate);

        const dayEvents = filtered.filter(event => (event.start || '').split(' ')[0] === key);

        const day = document.createElement('div');
        day.className = 'day';
        day.dataset.date = key;
        if (dayDate.getMonth() !== month) day.classList.add('outside');
        if (key === todayKey) day.classList.add('today');

        const dayLabel = window.innerWidth <= 700
          ? dayDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
          : dayDate.getDate();

        day.innerHTML = `<div class="day-number">${dayLabel}</div>`;
        renderGroupedEvents(day, dayEvents);
        calendar.appendChild(day);
      }
    }

    function renderWeekView() {
      const calendar = document.getElementById('calendar');
      calendar.className = 'calendar week-view';

      const monday = getMonday(currentDate);
      const filtered = getFilteredEvents();

      updateViewTitle();
      updateWeekdayHeaders();

      calendar.innerHTML = '';
      const todayKey = dateKey(new Date());

      for (let i = 0; i < 7; i++) {
        const dayDate = new Date(monday);
        dayDate.setDate(monday.getDate() + i);
        const key = dateKey(dayDate);

        const dayEvents = filtered.filter(event => (event.start || '').split(' ')[0] === key);

        const day = document.createElement('div');
        day.className = 'day';
        day.dataset.date = key;
        if (key === todayKey) day.classList.add('today');

        const dayLabel = window.innerWidth <= 700
          ? dayDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
          : dayDate.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' });

        day.innerHTML = `<div class="day-number">${dayLabel}</div>`;
        renderGroupedEvents(day, dayEvents);
        calendar.appendChild(day);
      }
    }

    function renderDayView() {
      const calendar = document.getElementById('calendar');
      calendar.className = 'calendar day-view-container';

      const filtered = getFilteredEvents();
      const key = dateKey(currentDate);

      updateViewTitle();
      updateWeekdayHeaders();

      calendar.innerHTML = '';

      const todayKey = dateKey(new Date());
      const dayDate = currentDate;

      const dayEvents = filtered.filter(event => (event.start || '').split(' ')[0] === key);

      const day = document.createElement('div');
      day.className = 'day';
      if (key === todayKey) day.classList.add('today');

      const dayLabel = dayDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      day.innerHTML = `<div class="day-number">${dayLabel}</div>`;

      if (!dayEvents.length) {
        const empty = document.createElement('div');
        empty.style.cssText = 'color: var(--muted); padding: 20px 0; text-align: center;';
        empty.textContent = 'No events scheduled for this day.';
        day.appendChild(empty);
        calendar.appendChild(day);
        return;
      }

      const groups = new Map();
      dayEvents.forEach(event => {
        const type = event.type || 'General';
        if (!groups.has(type)) groups.set(type, []);
        groups.get(type).push(event);
      });

      for (const [, events] of groups) {
        events.sort((a, b) => {
          const aTime = eventHasTime(a);
          const bTime = eventHasTime(b);
          if (aTime !== bTime) return aTime ? 1 : -1;
          if (aTime) return eventTime(a).localeCompare(eventTime(b));
          return 0;
        });
      }

      const sortedTypes = [...groups.keys()].sort();
      sortedTypes.forEach(type => {
        const header = document.createElement('h4');
        header.className = 'type-header';
        header.textContent = type;
        day.appendChild(header);
        groups.get(type).forEach(event => {
          day.appendChild(renderEvent(event));

          if (event._connection) {
            renderConnectedSubView(day, event);
          }
        });
      });

      calendar.appendChild(day);
    }

    function renderListView() {
      const calendar = document.getElementById('calendar');
      calendar.className = 'list-view-container';
      calendar.innerHTML = '';

      updateViewTitle();
      updateWeekdayHeaders();

      const miniCal = document.createElement('div');
      miniCal.className = 'mini-calendar';
      calendar.appendChild(miniCal);

      const listContainer = document.createElement('div');
      listContainer.className = 'list-event-container';
      calendar.appendChild(listContainer);

      renderMiniCalendar(miniCal);
      renderEventList(listContainer, true);

      listContainer.onscroll = () => {
        if (listContainer.scrollTop + listContainer.clientHeight >= listContainer.scrollHeight - 300) {
          renderEventList(listContainer, false);
        }
      };
    }

    function renderMiniCalendar(container) {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const header = document.createElement('div');
      header.className = 'mini-calendar-header';

      const prevBtn = document.createElement('button');
      prevBtn.textContent = '←';
      prevBtn.onclick = (e) => { e.stopPropagation(); currentDate.setMonth(month - 1); renderListView(); };
      header.appendChild(prevBtn);

      const label = document.createElement('span');
      label.className = 'month-label';
      label.textContent = new Date(year, month).toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
      header.appendChild(label);

      const nextBtn = document.createElement('button');
      nextBtn.textContent = '→';
      nextBtn.onclick = (e) => { e.stopPropagation(); currentDate.setMonth(month + 1); renderListView(); };
      header.appendChild(nextBtn);

      container.appendChild(header);

      const weekdays = document.createElement('div');
      weekdays.className = 'mini-weekdays';
      ['M', 'T', 'W', 'T', 'F', 'S', 'S'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'mini-weekday';
        el.textContent = d;
        weekdays.appendChild(el);
      });
      container.appendChild(weekdays);

      const grid = document.createElement('div');
      grid.className = 'mini-grid';

      const firstDay = new Date(year, month, 1);
      let monOffset = firstDay.getDay() - 1;
      if (monOffset < 0) monOffset = 6;
      const gridStart = new Date(firstDay);
      gridStart.setDate(firstDay.getDate() - monOffset);

      const todayKey = dateKey(new Date());
      const activeKey = dateKey(currentDate);

      for (let i = 0; i < 35; i++) {
        const d = new Date(gridStart);
        d.setDate(gridStart.getDate() + i);
        const key = dateKey(d);
        const el = document.createElement('div');
        el.className = 'mini-day';
        if (d.getMonth() !== month) el.classList.add('outside');
        if (key === todayKey) el.classList.add('today');
        if (key === activeKey) el.classList.add('active');
        el.textContent = d.getDate();
        el.onclick = () => { currentDate = new Date(d); renderListView(); };
        grid.appendChild(el);
      }

      container.appendChild(grid);
    }

    let listLoading = false;

    function renderEventList(container, reset) {
      if (reset) {
        container.innerHTML = '';
        listLoading = false;
      }

      if (listLoading) return;
      listLoading = true;

      const filtered = getFilteredEvents();
      const batchSize = 14;
      const existingDays = container.querySelectorAll('.list-day-header').length;
      const startOffset = reset ? 0 : existingDays;
      const todayKey = dateKey(new Date());

      container.querySelectorAll('.list-sentinel').forEach(el => el.remove());

      const startDate = new Date(currentDate);
      startDate.setDate(startDate.getDate() + startOffset);

      for (let i = 0; i < batchSize; i++) {
        const d = new Date(startDate);
        d.setDate(startDate.getDate() + i);
        const key = dateKey(d);

        const dayEvents = filtered.filter(event => (event.start || '').split(' ')[0] === key);

        const header = document.createElement('div');
        header.className = 'list-day-header';
        const isToday = key === todayKey;
        header.textContent = isToday
          ? d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) + ' — Today'
          : d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        container.appendChild(header);

        if (!dayEvents.length) {
          const empty = document.createElement('div');
          empty.style.cssText = 'color: var(--muted); padding: 8px 0 16px; font-size: 13px;';
          empty.textContent = 'No events scheduled.';
          container.appendChild(empty);
        } else {
          const allDay = dayEvents.filter(e => !eventHasTime(e));
          const timed = dayEvents.filter(e => eventHasTime(e));
          timed.sort((a, b) => eventTime(a).localeCompare(eventTime(b)));
          [...allDay, ...timed].forEach(event => {
            container.appendChild(renderEvent(event));
            if (event._connection) {
              renderConnectedSubView(container, event);
            }
          });
        }
      }

      const sentinel = document.createElement('div');
      sentinel.className = 'list-sentinel';
      container.appendChild(sentinel);

      listLoading = false;
    }

    function renderConnectedSubView(container, event) {
      const target = event._connection.target;
      const targetDate = (target.start || '').split(' ')[0];
      const dateObj = new Date(targetDate + 'T00:00:00');
      const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      const label = document.createElement('div');
      label.className = 'connected-label';
      label.textContent = '↔ Connected';
      container.appendChild(label);

      const divider = document.createElement('div');
      divider.className = 'connected-divider';
      container.appendChild(divider);

      const card = document.createElement('div');
      card.className = 'connected-event';

      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = target.title || 'Untitled event';
      card.appendChild(title);

      const meta = document.createElement('div');
      meta.className = 'meta-row';

      if (eventHasTime(target)) {
        const st = eventTime(target);
        const et = eventEndTime(target) || '23:59';
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = formatTime(st) + ' - ' + formatTime(et);
        meta.appendChild(tag);
      } else {
        const tt = extractTitleTime(target.title);
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = tt || 'All day';
        meta.appendChild(tag);
      }

      const network = normalizeNetwork(target.network);
      if (network) {
        const tag = document.createElement('span');
        const cc = networkClass(network);
        tag.className = cc ? `tag ${cc}` : 'tag';
        tag.textContent = network;
        meta.appendChild(tag);
      }

      if (target.type) {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = target.type;
        meta.appendChild(tag);
      }

      card.appendChild(meta);

      const btn = document.createElement('button');
      btn.className = 'view-btn';
      btn.textContent = 'View on ' + dateStr + ' →';
      btn.onclick = () => goToDayView(targetDate);
      card.appendChild(btn);

      container.appendChild(card);
    }

    function goToDayView(dateStr) {
      const parts = dateStr.split('-').map(Number);
      currentDate = new Date(parts[0], parts[1] - 1, parts[2]);
      currentView = 'day';
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.view-btn[data-view="day"]').classList.add('active');
      renderCalendar();
    }

    function prev() {
      if (currentView === 'month' || currentView === 'list') {
        currentDate.setMonth(currentDate.getMonth() - 1);
      } else if (currentView === 'week') {
        currentDate.setDate(currentDate.getDate() - 7);
      } else {
        currentDate.setDate(currentDate.getDate() - 1);
      }
      renderCalendar();
    }

    function next() {
      if (currentView === 'month' || currentView === 'list') {
        currentDate.setMonth(currentDate.getMonth() + 1);
      } else if (currentView === 'week') {
        currentDate.setDate(currentDate.getDate() + 7);
      } else {
        currentDate.setDate(currentDate.getDate() + 1);
      }
      renderCalendar();
    }

    function goToday() {
      currentDate = new Date();
      if (currentView === 'week') {
        currentDate = getMonday(currentDate);
      }
      renderCalendar();
    }

    const typeDescriptions = {
      "Weekly Upgrades": "Regularly scheduled Splice version upgrades across networks.",
      "Protocol Upgrades (LSU)": "Ledger Synchronization Unit protocol upgrades requiring a topology freeze.",
      "Configuration Change": "Changes to network configuration settings or enabling new features.",
      "Minimum Splice Versions": "Updates to the minimum required Splice validator version for each network.",
      "Minimum Splice Dar versions": "Updates to minimum required .dar package versions for each network."
    };

    function showTypeInfo() {
      const backdrop = document.createElement('div');
      backdrop.className = 'popover-backdrop';
      backdrop.onclick = hideTypeInfo;
      document.body.appendChild(backdrop);

      const popover = document.createElement('div');
      popover.className = 'popover';

      const close = document.createElement('button');
      close.className = 'popover-close';
      close.textContent = '✕';
      close.onclick = hideTypeInfo;
      popover.appendChild(close);

      const title = document.createElement('h3');
      title.textContent = 'Activity Types';
      popover.appendChild(title);

      const select = document.getElementById('typeFilter');
      const options = [...select.querySelectorAll('option')].filter(o => o.value);

      options.forEach(option => {
        const item = document.createElement('div');
        item.className = 'popover-item';

        const name = document.createElement('div');
        name.className = 'popover-item-name';
        name.textContent = option.value;

        const desc = document.createElement('div');
        desc.className = 'popover-item-desc';
        desc.textContent = typeDescriptions[option.value] || 'No description available.';

        item.appendChild(name);
        item.appendChild(desc);
        popover.appendChild(item);
      });

      document.body.appendChild(popover);

      document.addEventListener('keydown', handleEscape);
    }

    function hideTypeInfo() {
      document.querySelectorAll('.popover-backdrop, .popover').forEach(el => el.remove());
      document.removeEventListener('keydown', handleEscape);
    }

    function toggleListView() {
      const btn = document.getElementById('listViewBtn');
      if (currentView === 'list') return;
      currentView = 'list';
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCalendar();
    }

    function handleEscape(e) {
      if (e.key === 'Escape') hideTypeInfo();
    }

    document.getElementById('search').addEventListener('input', renderCalendar);
    document.getElementById('networkFilter').addEventListener('change', renderCalendar);
    document.getElementById('typeFilter').addEventListener('change', renderCalendar);

    document.getElementById('viewToggle').addEventListener('click', (e) => {
      const btn = e.target.closest('.view-btn');
      if (!btn || btn.dataset.view === currentView) return;

      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('listViewBtn').classList.remove('active');
      btn.classList.add('active');

      currentView = btn.dataset.view;

      if (currentView === 'week') {
        currentDate = getMonday(currentDate);
      }

      renderCalendar();
    });

    document.getElementById('calendar').addEventListener('click', (e) => {
      const dayEl = e.target.closest('.day');
      if (!dayEl || !dayEl.dataset.date || currentView === 'day') return;
      goToDayView(dayEl.dataset.date);
    });

    loadSchedule();
  </script>
</body>
</html>
